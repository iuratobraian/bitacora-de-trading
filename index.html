
<!DOCTYPE html>
<html lang="es" class="dark">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="https://fav.farm/📈" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0a0a0a" />
    <title>Braian Iurato | Terminal de Trading</title>
    
    <link rel="manifest" href="/manifest.json" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <script>
      window.process = window.process || { env: {} };
      
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              mono: ['JetBrains Mono', 'monospace'],
            },
            colors: {
              background: '#0a0a0a',
              surface: 'rgba(22, 22, 22, 0.7)',
              border: 'rgba(38, 38, 38, 0.5)',
              primary: '#00cc66',
              'primary-dark': '#00a352',
              loss: '#ef4444',
              neutral: '#3b82f6',
            }
          }
        }
      }
    </script>
    <style>
      body { 
        background-color: #0a0a0a; 
        color: #e5e5e5; 
        overflow-x: hidden;
        font-feature-settings: "tnum"; /* Tabular nums for better alignment */
      }
      
      /* Animación de Fondo Futurista - Intensidad Aumentada */
      .bg-animation {
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        z-index: -1;
        background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%); /* Centro ligeramente más claro */
        overflow: hidden;
      }

      .bg-grid {
        position: absolute;
        width: 200%; height: 200%;
        top: -50%; left: -50%;
        background-image: 
          linear-gradient(to right, rgba(0, 204, 102, 0.08) 1px, transparent 1px), /* Opacidad aumentada a 0.08 */
          linear-gradient(to bottom, rgba(0, 204, 102, 0.08) 1px, transparent 1px);
        background-size: 50px 50px;
        transform: perspective(500px) rotateX(60deg);
        animation: grid-move 20s linear infinite;
        opacity: 0.8; /* Asegura visibilidad */
      }

      @keyframes grid-move {
        from { transform: perspective(500px) rotateX(60deg) translateY(0); }
        to { transform: perspective(500px) rotateX(60deg) translateY(50px); }
      }

      .bg-glow {
        position: absolute;
        width: 100%; height: 100%;
        background: radial-gradient(circle at 50% 50%, rgba(0, 204, 102, 0.05) 0%, transparent 60%); /* Glow central más visible */
        pointer-events: none;
      }

      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: #555; }
      #root { min-height: 100vh; position: relative; z-index: 1; }
    </style>
<link rel="stylesheet" href="/index.css">
</head>
  <body>
    <div class="bg-animation">
        <div class="bg-grid"></div>
        <div class="bg-glow"></div>
    </div>
    <div id="root"></div>
    <script type="module" src="/index.tsx?v=4"></script>
  </body>
</html>
